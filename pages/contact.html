<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>神田 聖奈 | Contact</title>
        <link rel="icon" href="../assets/images/fav_logo.png" id="favicon">
        <link rel="stylesheet" href="../assets/css/base.css">
        <link rel="stylesheet" href="../assets/css/contact.css">
    </head>

    <body>
        <!-- ヘッダー -->
        <div id="header"></div>


        <!-- メイン -->
            <div class="box">
                <span class="box-title">Feel free to contact me</span>
                <p id="info">以下のフォーム、またはメールアドレス（tck2563871@stu.o-hara.ac.jp）までお問い合わせください。</p>

                <form
                    id="contact-form"
                    class="Form"
                    action="https://formspree.io/f/xdarqaay"
                    method="POST">

                    <!-- スパム対策（ハニーポット） -->
                    <input
                        type="text"
                        name="_gotcha"
                        style="display:none">

                    <div class="Form-Item">
                        <p class="Form-Item-Label">
                            <span class="Form-Item-Label-Required">必須</span>所属名
                        </p>

                        <input
                            type="text"
                            name="company"
                            class="Form-Item-Input"
                            placeholder="例）株式会社令和"
                            required>
                    </div>

                    <div class="Form-Item">
                        <p class="Form-Item-Label">
                            <span class="Form-Item-Label-Required">必須</span>氏名
                        </p>

                        <input
                            type="text"
                            name="name"
                            class="Form-Item-Input"
                            placeholder="例）山田太郎"
                            required>
                    </div>

                    <div class="Form-Item">
                        <p class="Form-Item-Label">
                            <span class="Form-Item-Label-Required">必須</span>メールアドレス
                        </p>

                        <input
                            type="email"
                            name="email"
                            class="Form-Item-Input"
                            placeholder="例）example@gmail.com"
                            required>
                    </div>

                    <div class="Form-Item">
                        <p class="Form-Item-Label isMsg">
                            <span class="Form-Item-Label-Required">必須</span>お問い合わせ内容
                        </p>

                        <textarea
                            name="message"
                            class="Form-Item-Textarea"
                            required></textarea>
                    </div>

                    <button
                        type="submit"
                        class="Form-Btn">
                        送信する
                    </button>

                </form>
            </div>
        <!-- メイン -->

        <!-- Footer -->
        <div id="footer"></div>

        <!-- JavaScript -->
        <script src="../assets/js/include.js"></script>
        <script src="../assets/js/common.js"></script>

    </body>
</html>
