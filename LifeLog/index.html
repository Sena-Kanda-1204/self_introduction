<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Log</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Life Log</h1>
    <p class="sub-title">～人生経験を資産化するライフログシステム～</p>
</header>

<div class="year-nav" id="yearNav"></div>

<main class="timeline" id="timeline"></main>

<!-- 編集モーダル -->
<div class="modal" id="editModal">

    <div class="modal-content">

        <button onclick="closeModal()" class="modal-close">×</button>

        <h2 class="modal-title">イベント編集</h2>

        <div class="form-group">
            <label>タイトル</label>
            <input type="text" id="editTitle">
        </div>

        <div class="form-group">
            <label>日付</label>
            <input type="date" id="editDate">
        </div>

        <div class="form-group">
            <label>場所</label>
            <input type="text" id="editLocation">
        </div>

        <div class="form-group">
            <label>説明</label>
            <textarea id="editDescription"></textarea>
        </div>

         <!-- 感情タグ -->
        <div class="emotion-form" id="editEmotions">

            <label class="emotion-box">
                <input type="checkbox" value="成長"><span>成長</span>
            </label>

            <label class="emotion-box">
                <input type="checkbox" value="挑戦"><span>挑戦</span>
            </label>

            <label class="emotion-box">
                <input type="checkbox" value="達成感"><span>達成感</span>
            </label>

            <label class="emotion-box">
                <input type="checkbox" value="楽しい"><span>楽しい</span>
            </label>

            <label class="emotion-box">
                <input type="checkbox" value="安心"><span>安心</span>
            </label>

            <label class="emotion-box">
                <input type="checkbox" value="不安"><span>不安</span>
            </label>

            <label class="emotion-box">
                <input type="checkbox" value="緊張"><span>緊張</span>
            </label>

        </div>

        <!-- ファイル -->
        <div class="form-group">
            <label>ファイル</label>
            <input type="file" id="editFileInput">
            <p id="editFileStatus"></p>
        </div>

        <div class="modal-footer">
            <button class="delete-btn" onclick="deleteEvent()">削除</button>
            <button class="save-btn" onclick="saveEdit()">保存</button>
        </div>

    </div>
</div>

<!-- 検索モーダル -->
<div class="modal" id="searchModal">

    <div class="modal-content">

        <button onclick="closeSearchModal()" class="modal-close">×</button>

        <h2 class="modal-title">検索</h2>

        
        <div class="form-group">
            <label>
                <input type="checkbox" id="favOnly">
                お気に入りのみ
            </label>
        </div>

        <div class="form-group">
            <label>キーワード</label>
            <div class="keyword-row">

            <input type="text" id="keyword1" placeholder="キーワード1">

            <select id="keywordMode">
                <option value="or">OR</option>
                <option value="and">AND</option>
            </select>

            <input type="text" id="keyword2" placeholder="キーワード2">

        </div>

        </div>

        <div class="form-group">
            <label>日付範囲</label>
            <input type="date" id="fromDate">
            <p>　　↓</p>
            <input type="date" id="toDate">
        </div>

        <div class="emotion-form">
            <label class="emotion-box"><input type="checkbox" value="成長"><span>成長</span></label>
            <label class="emotion-box"><input type="checkbox" value="挑戦"><span>挑戦</span></label>
            <label class="emotion-box"><input type="checkbox" value="達成感"><span>達成感</span></label>
            <label class="emotion-box"><input type="checkbox" value="楽しい"><span>楽しい</span></label>
            <label class="emotion-box"><input type="checkbox" value="安心"><span>安心</span></label>
            <label class="emotion-box"><input type="checkbox" value="不安"><span>不安</span></label>
            <label class="emotion-box"><input type="checkbox" value="緊張"><span>緊張</span></label>
        </div>
     
        <div class="form-group">
            <label>カラー</label>

            <div class="color-palette" id="searchColorPalette">

                <div class="color-dot" data-color=""></div> <!-- 未選択 -->

                <div class="color-dot" data-color="none"></div>
                <div class="color-dot" data-color="#e3f2fd" style="background:#e3f2fd"></div>
                <div class="color-dot" data-color="#e8f5e9" style="background:#e8f5e9"></div>
                <div class="color-dot" data-color="#fff3e0" style="background:#fff3e0"></div>
                <div class="color-dot" data-color="#fce4ec" style="background:#fce4ec"></div>
                <div class="color-dot" data-color="#ede7f6" style="background:#ede7f6"></div>
                <div class="color-dot" data-color="#f3e5f5" style="background:#f3e5f5"></div>
                <div class="color-dot" data-color="#e0f2f1" style="background:#e0f2f1"></div>
                <div class="color-dot" data-color="#fffde7" style="background:#fffde7"></div>
                <div class="color-dot" data-color="#efebe9" style="background:#efebe9"></div>

            </div>

            <input type="hidden" id="searchColor">
        </div>

        <div class="modal-footer">
            <button class="delete-btn" onclick="resetSearch()">リセット</button>
            <button class="save-btn" onclick="executeSearch()">検索</button>
        </div>

    </div>
</div>

<!-- トースト -->
<div id="toast" class="toast"></div>

<!-- 画像拡大モーダル -->
<div id="imageModal" class="image-modal">
    <span class="image-modal-close" onclick="closeImageModal()">×</span>
    <img id="expandedImage" class="image-modal-content" style="display:none;">
    <iframe id="pdfFrame" class="image-modal-content" style="display:none; width:90vw; height:90vh; border:none;"></iframe>
</div>

<!-- FAB -->
<a href="add.html" class="fab-button add" aria-label="イベント追加">
    ＋
</a>

<a class="fab-button search" onclick="openSearchModal()">
    🔍
</a>


<script src="js/dataManager.js"></script>

<script src="js/ui/utils.js"></script>
<script src="js/ui/card.js"></script>
<script src="js/ui/line.js"></script>
<script src="js/ui/timeline.js"></script>
<script src="js/ui/modal.js"></script>
<script src="js/ui/search.js"></script>
<script src="js/ui/toast.js"></script>

<script src="js/app.js"></script>


</body>
</html>
